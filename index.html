<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
html, body {
    margin: 0;
    height: 100%;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Playfair Display', serif;
    background: linear-gradient(135deg, #ffc0cb, #ffe4ec);
}

.container {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* KARAKTER */
.characters {
    font-size: 70px;
    animation: bounce 1.5s infinite;
}

@keyframes bounce {
    0%,100% {transform:translateY(0);}
    50% {transform:translateY(-12px);}
}

/* 🌸 BOUQUET */
.bouquet {
    width: 180px;
    opacity: 0;
}

.stemGroup {
    opacity: 0;
    transform: translateY(40px) scale(0.8);
}

.showStem {
    animation: grow 1s ease forwards, sway 4s ease-in-out infinite;
}

@keyframes grow {
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

/* goyang */
@keyframes sway {
    0% { transform: rotate(0deg); }
    25% { transform: rotate(1.5deg); }
    50% { transform: rotate(0deg); }
    75% { transform: rotate(-1.5deg); }
    100% { transform: rotate(0deg); }
}

/* BUTTON */
.buttons, .buttons2 {
    margin-top: 20px;
    display: flex;
    gap: 15px;
    opacity: 0;
    transform: translateY(20px);
}

.showBtn {
    animation: fadeUp 1s ease forwards;
}

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

button {
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
}

.yes { background:#ff4d6d; color:white; }
.no { background:#aaa; color:white; }

/* TEXT */
.text {
    display: none;
    margin-top: 20px;
    font-size: 22px;
    line-height: 1.6;
}

.mainText { color:#ff2e63; }
.questionText { color:#c94f7c; font-style: italic; }

/* typing */
.word {
    opacity: 0;
    transform: translateY(10px);
    display: inline-block;
    animation: fadeWord 0.5s forwards;
    margin-right: 6px;
}

@keyframes fadeWord {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>
</head>

<body>

<audio id="bgMusic" src="HYBS - TipToe (Official Video).mp3" preload="auto" loop></audio>

<div class="container">

    <div class="characters" id="char">🐻💖🐰</div>

    <!-- 🌸 BOUQUET SVG -->
    <svg class="bouquet" id="bouquet" viewBox="0 0 200 200">

        <!-- STEM 1 -->
        <g class="stemGroup" id="s1">
            <line x1="100" y1="180" x2="70" y2="100" stroke="#4CAF50" stroke-width="3"/>
            <circle cx="70" cy="100" r="10" fill="#ff9eb5"/>
        </g>

        <!-- STEM 2 -->
        <g class="stemGroup" id="s2">
            <line x1="100" y1="180" x2="100" y2="90" stroke="#4CAF50" stroke-width="3"/>
            <circle cx="100" cy="90" r="10" fill="#ffc0cb"/>
        </g>

        <!-- STEM 3 -->
        <g class="stemGroup" id="s3">
            <line x1="100" y1="180" x2="130" y2="100" stroke="#4CAF50" stroke-width="3"/>
            <circle cx="130" cy="100" r="10" fill="#ff85a2"/>
        </g>

        <!-- STEM 4 -->
        <g class="stemGroup" id="s4">
            <line x1="100" y1="180" x2="50" y2="130" stroke="#4CAF50" stroke-width="3"/>
            <circle cx="50" cy="130" r="8" fill="#ffb6c1"/>
        </g>

        <!-- STEM 5 -->
        <g class="stemGroup" id="s5">
            <line x1="100" y1="180" x2="150" y2="130" stroke="#4CAF50" stroke-width="3"/>
            <circle cx="150" cy="130" r="8" fill="#ff99aa"/>
        </g>

    </svg>

    <h2 id="question">i have something to say for you, are you ready?</h2>

    <div class="buttons showBtn" id="btn1">
        <button class="yes" id="yes1">Yes</button>
        <button class="no" id="no1">No</button>
    </div>

    <div class="text mainText" id="msg1"></div>
    <div class="text questionText" id="msg2"></div>

    <div class="buttons2" id="btn2">
        <button class="yes" id="yes2">Yes</button>
        <button class="no" id="no2">No</button>
    </div>

    <div class="text mainText" id="msg3"></div>

</div>

<script>
const music = document.getElementById("bgMusic");

function playMusic() {
    music.load();
    music.volume = 0.5;
    music.play().catch(()=>{});
}

// typing
function typeWordsSmooth(el,text,delay=250){
    el.style.display="block";
    el.innerHTML="";
    text.split(" ").forEach((w,i)=>{
        let s=document.createElement("span");
        s.className="word";
        s.style.animationDelay=(i*delay)+"ms";
        s.textContent=w;
        el.appendChild(s);
    });
}

// tombol kabur klik
function antiClick(btn){
    btn.addEventListener("click",(e)=>{
        e.preventDefault();
        btn.style.position="fixed";
        btn.style.left=Math.random()*80+"%";
        btn.style.top=Math.random()*80+"%";
    });
}

antiClick(no1);

yes1.onclick=()=>{
    playMusic();

    question.style.display="none";
    btn1.style.display="none";

    char.style.display="none";
    bouquet.style.opacity="1";

    // muncul per tangkai
    const stems=["s1","s2","s3","s4","s5"];
    stems.forEach((id,i)=>{
        setTimeout(()=>{
            document.getElementById(id).classList.add("showStem");
        }, i*400);
    });

    typeWordsSmooth(msg1,"you’re the prettiest, smartest, cutest girl i’ve seen i love you ❤️");

    setTimeout(()=>{
        typeWordsSmooth(msg2,"i have something else, wanna see?");
    },3500);

    setTimeout(()=>{
        btn2.style.display="flex";
        btn2.classList.add("showBtn");
        antiClick(no2);
    },6000);
};

yes2.onclick=()=>{
    btn2.style.display="none";

    typeWordsSmooth(
        msg3,
        "You're amazing babe, you've done your best and im proud of you. Keep it up pwitiee, i'll always be there for you 💖"
    );
};
</script>

</body>
</html>
