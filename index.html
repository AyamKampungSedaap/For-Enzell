<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<style>
html, body {
    margin: 0;
    height: 100%;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffc0cb, #ffe4ec);
}

/* CENTER */
.container {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* CHARACTER */
.characters {
    font-size: 70px;
    animation: bounce 1.5s infinite;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
}

h2 {
    color: #d63384;
    font-size: 18px;
}

/* BUTTON */
.buttons {
    margin-top: 20px;
    display: flex;
    gap: 15px;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
}

.yes {
    background-color: #ff4d6d;
    color: white;
}

.no {
    background-color: #aaa;
    color: white;
    position: relative;
}

/* TEXT 1 */
.message1 {
    display: none;
    margin-top: 25px;
    font-size: 20px;
    color: #ff2e63;
    opacity: 0;
    transform: translateX(200px);
}

.show1 {
    display: block;
    animation: slideRight 3s ease forwards;
}

@keyframes slideRight {
    from {
        opacity: 0;
        transform: translateX(200px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

/* TEXT 2 */
.message2 {
    display: none;
    margin-top: 15px;
    font-size: 18px;
    color: #d63384;
    opacity: 0;
    transform: translateX(-150px);
}

.show2 {
    display: block;
    animation: slideLeft 2s ease forwards;
}

@keyframes slideLeft {
    from {
        opacity: 0;
        transform: translateX(-150px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

/* BUTTON 2 */
.buttons2 {
    display: none;
    margin-top: 15px;
    gap: 10px;
    opacity: 0;
    transform: translateY(100px);
}

.show3 {
    display: flex;
    animation: slideUp 1.5s ease forwards;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(100px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* MOBILE */
@media (max-width: 480px) {
    .characters { font-size: 50px; }
    button { font-size: 14px; }
}
</style>
</head>

<body>

<audio id="bgMusic" src="tptoe.mp3" loop></audio>

<div class="container">

    <div class="characters">🐻💖🐰</div>

    <h2 id="question">i have something to say for you, are you ready?</h2>

    <div class="buttons" id="btn1">
        <button class="yes" id="yes1">Yes</button>
        <button class="no" id="no1">No</button>
    </div>

    <div class="message1" id="msg1">
        you’re the prettiest, smartest, cuttest girl i’ve seen i love you ❤️
    </div>

    <div class="message2" id="msg2">
        i have something else
    </div>

    <div class="buttons2" id="btn2">
        <button class="yes" id="yes2">Yes</button>
        <button class="no" id="no2">No</button>
    </div>

</div>

<script>
const music = document.getElementById("bgMusic");

// autoplay fallback
document.addEventListener("click", () => {
    if (music.paused) music.play();
}, { once: true });

// 😈 FUNCTION KABUR FIX TOTAL
function kabur(btn) {
    function move() {
        const btnWidth = btn.offsetWidth;
        const btnHeight = btn.offsetHeight;

        const maxX = window.innerWidth - btnWidth;
        const maxY = window.innerHeight - btnHeight;

        const x = Math.random() * maxX;
        const y = Math.random() * maxY;

        btn.style.position = "fixed";
        btn.style.left = x + "px";
        btn.style.top = y + "px";
    }

    btn.addEventListener("mouseover", move);
    btn.addEventListener("mousedown", move);
    btn.addEventListener("touchstart", move);
}

// aktifin NO pertama
kabur(document.getElementById("no1"));

// FLOW
document.getElementById("yes1").onclick = () => {
    document.getElementById("question").style.display = "none";
    document.getElementById("btn1").style.display = "none";

    const msg1 = document.getElementById("msg1");
    msg1.classList.add("show1");

    setTimeout(() => {
        document.getElementById("msg2").classList.add("show2");
    }, 2500);

    setTimeout(() => {
        const btn2 = document.getElementById("btn2");
        btn2.classList.add("show3");

        // 🔥 FIX UTAMA: aktifin kabur SETELAH muncul
        kabur(document.getElementById("no2"));
    }, 4000);
};

// tombol yes kedua
document.getElementById("yes2").onclick = () => {
    alert("You're amazing babe, you've done your best and im proud of you. Keep it up pwitiee, i'll always be there for you💖");
};
</script>

</body>
</html>
