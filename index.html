<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
html, body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    user-select: none;
}

body {
    font-family: 'Playfair Display', serif;
    background: linear-gradient(135deg, #ffc0cb, #ffe4ec);
    position: relative;
}

/* 🔥 STATE CONTAINER - SAM format */
.stateContainer {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 20px;
    width: 100%;
    max-width: 400px;
    padding: 20px;
    box-sizing: border-box;
    z-index: 10;
}

/* 💋 KISS */
.kissWrap {
    opacity: 0;
    transform: translateY(-20px) scale(0.8);
    animation: kissIn 1.2s ease forwards;
}

@keyframes kissIn {
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

.kissWrap lord-icon {
    animation: float 2.5s ease-in-out infinite;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

.stateContainer h2 {
    margin: 0;
    font-size: clamp(20px, 4vw, 28px);
    line-height: 1.3;
    max-width: 90%;
}

/* BUTTON */
.buttons {
    display: flex;
    gap: 12px;
    opacity: 0;
    transform: translateY(20px);
}

.showBtn {
    animation: fadeUp 1s ease forwards;
}

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

button {
    padding: 12px 24px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 16px;
    font-weight: 500;
    min-width: 80px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    transition: all 0.3s ease;
    position: relative;
    z-index: 20;
}

.yes { 
    background: linear-gradient(135deg, #ff4d6d, #ff6b9d);
    color: white;
}
.yes:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 77, 109, 0.6); }
.no { 
    background: linear-gradient(135deg, #aaa, #ccc);
    color: white;
}
.no:hover { transform: translateY(-2px); }

/* 🔥 NO BUTTON RANDOM POSITION - BENAR-BENAR DI DALAM LAYAR */
.noButtonRandom {
    position: fixed !important;
    z-index: 9999 !important;
    animation: bounceIn 0.3s ease-out;
    pointer-events: auto;
    left: 0 !important;
    top: 0 !important;
}

@keyframes bounceIn {
    0% {
        transform: scale(0.8) rotate(-10deg);
        opacity: 0;
    }
    50% {
        transform: scale(1.1) rotate(5deg);
    }
    100% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
    }
}

/* 🌸 FLOWER */
.bouquet {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    width: 200px;
    opacity: 0;
    transition: all 1s ease;
    z-index: 5;
}

/* RESPONSIVE */
@media (max-width: 480px) {
    .stateContainer {
        gap: 15px;
        padding: 15px;
    }
    button {
        padding: 10px 20px;
        font-size: 15px;
        min-width: 70px;
    }
    .noButtonRandom {
        padding: 10px 18px !important;
        font-size: 14px !important;
    }
}
</style>
</head>

<body>

<audio id="bgMusic" src="HYBS - TipToe (Official Video).mp3" preload="auto" loop></audio>

<script src="https://cdn.lordicon.com/lordicon.js"></script>

<!-- STATE 1 -->
<div class="stateContainer" id="state1">
    <div class="kissWrap" id="char1">
        <lord-icon
            src="https://cdn.lordicon.com/xyboiuok.json"
            trigger="loop"
            colors="primary:#ff4d6d,secondary:#ff9eb5"
            style="width:120px;height:120px">
        </lord-icon>
    </div>

    <h2 id="question1">i have something to say for you, are you ready?</h2>

    <div class="buttons showBtn" id="btn1">
        <button class="yes" id="yes1">Yes</button>
        <button class="no" id="no1">No</button>
    </div>
</div>

<!-- STATE 2 ELEMENTS -->
<lord-icon class="bouquet" id="bouquet1" src="https://cdn.lordicon.com/eaxiadjd.json" trigger="loop" colors="primary:#ff4d6d,secondary:#ffb6c1,tertiary:#ffd6e0" style="width:200px;height:200px"></lord-icon>

<!-- STATE 3 -->
<div class="stateContainer" id="state3" style="display:none;">
    <div class="kissWrap" id="char3">
        <lord-icon
            src="https://cdn.lordicon.com/xyboiuok.json"
            trigger="loop"
            colors="primary:#ff4d6d,secondary:#ff9eb5"
            style="width:120px;height:120px">
        </lord-icon>
    </div>

    <h2 id="question3">[TULIS TEXT STATE 3 DI SINI]</h2>

    <div class="buttons showBtn" id="btn3">
        <button class="yes" id="yes3">Yes</button>
        <button class="no" id="no3">No</button>
    </div>
</div>

<script>
const music = document.getElementById("bgMusic");

function playMusic() {
    music.load();
    music.volume = 0.5;
    music.play().catch(()=>{});
}

function typeWordsSmooth(el, text, delay=250){
    el.style.display = "block";
    el.innerHTML = "";
    text.split(" ").forEach((w, i)=>{
        let s = document.createElement("span");
        s.className = "word";
        s.style.animationDelay = (i * delay) + "ms";
        s.textContent = w;
        el.appendChild(s);
    });
}

function moveNoButtonRandom(btn) {
    btn.removeEventListener('mouseover', btn.randomMoveHandler);
    btn.removeEventListener('touchstart', btn.randomMoveHandler);
    
    btn.randomMoveHandler = function() {
        const margin = 20;
        const btnRect = btn.getBoundingClientRect();
        const btnWidth = btnRect.width || 100;
        const btnHeight = btnRect.height || 50;
        
        // ✅ BENAR-BENAR DI DALAM LAYAR
        const maxX = Math.max(0, window.innerWidth - btnWidth - margin);
        const maxY = Math.max(0, window.innerHeight - btnHeight - margin);
        
        const randomX = Math.random() * maxX + margin;
        const randomY = Math.random() * maxY + margin;
        
        btn.style.position = "fixed";
        btn.style.left = randomX + "px";
        btn.style.top = randomY + "px";
        btn.style.transform = "scale(1.05)";
        btn.classList.add("noButtonRandom");
        btn.style.zIndex = "9999";
        
        setTimeout(() => {
            btn.style.transform = "scale(1)";
        }, 300);
        
        setTimeout(() => {
            moveNoButtonRandom(btn);
        }, 50);
    };
    
    btn.addEventListener('mouseover', btn.randomMoveHandler);
    btn.addEventListener('touchstart', btn.randomMoveHandler);
}

// STATE 1
const no1 = document.getElementById("no1");
moveNoButtonRandom(no1);

document.getElementById("yes1").onclick = ()=>{
    playMusic();
    
    // Hide state 1
    document.getElementById("state1").style.display = "none";
    
    // Show bouquet
    document.getElementById("bouquet1").style.opacity = "1";
    document.getElementById("bouquet1").style.transform = "translate(-50%, -50%) scale(1)";
    
    // Text state 2 - POSISI SAMA STATE 1
    const msg1 = document.createElement("div");
    msg1.id = "msg1";
    msg1.className = "stateContainer";
    msg1.innerHTML = '<h2 id="text1" style="font-size: clamp(20px, 4vw, 28px); line-height: 1.3; max-width: 90%; margin: 0;"></h2>';
    document.body.appendChild(msg1);
    
    typeWordsSmooth(document.getElementById("text1"), "you’re the prettiest, smartest, cutest girl i’ve seen i love you ❤️");
    
    setTimeout(()=>{
        const msg2 = document.createElement("div");
        msg2.id = "msg2";
        msg2.className = "stateContainer";
        msg2.innerHTML = '<h2 id="question2" style="font-size: clamp(20px, 4vw, 28px); line-height: 1.3; max-width: 90%; margin: 0; font-style: italic; color: #c94f7c;"></h2>';
        document.body.appendChild(msg2);
        
        typeWordsSmooth(document.getElementById("question2"), "i have something else, wanna see?");
    }, 3500);

    setTimeout(()=>{
        // Show btn2 di posisi sama state 1
        const btn2 = document.getElementById("btn2") || document.createElement("div");
        if (!document.getElementById("btn2")) {
            btn2.id = "btn2";
            btn2.className = "buttons showBtn";
            btn2.innerHTML = '<button class="yes" id="yes2">Yes</button><button class="no" id="no2">No</button>';
            btn2.style.position = "fixed";
            btn2.style.top = "50%";
            btn2.style.left = "50%";
            btn2.style.transform = "translate(-50%, 30px)";
            document.body.appendChild(btn2);
        }
        btn2.style.display = "flex";
        
        const no2 = document.getElementById("no2");
        moveNoButtonRandom(no2);
    }, 6000);
};

// STATE 2 to STATE 3
document.addEventListener('click', function(e) {
    if (e.target.id === 'yes2') {
        // Hide state 2 elements
        document.getElementById("msg1")?.remove();
        document.getElementById("msg2")?.remove();
        document.getElementById("btn2")?.remove();
        document.getElementById("bouquet1").style.opacity = "0";
        
        // Show state 3
        document.getElementById("state3").style.display = "flex";
    }
});

// STATE 3
const no3 = document.getElementById("no3");
moveNoButtonRandom(no3);

document.getElementById("yes3").onclick = ()=>{
    // GANTI TEXT DI SINI
    document.getElementById("question3").textContent = "You're amazing babe, you've done your best and im proud of you. Keep it up pwitiee, i'll always be there for you 💖";
};
</script>

</body>
</html>
