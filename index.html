<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
html, body {
    margin: 0;
    height: 100%;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Playfair Display', serif;
    background: linear-gradient(135deg, #ffc0cb, #ffe4ec);
}

.container {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* 💋 KISS ANIMATION */
.kissWrap {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 10px; /* biar pas di atas text */
    opacity: 0;
    transform: translateY(-20px) scale(0.8);
    animation: kissIn 1.2s ease forwards;
}

@keyframes kissIn {
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

/* animasi setelah muncul */
.kissWrap lord-icon {
    animation: float 2.5s ease-in-out infinite;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

/* 🌸 FLOWER */
.bouquet {
    width: 200px;
    opacity: 0;
    transition: opacity 1s ease;
}

/* BUTTON */
.buttons, .buttons2 {
    margin-top: 20px;
    display: flex;
    gap: 15px;
    opacity: 0;
    transform: translateY(20px);
}

.showBtn {
    animation: fadeUp 1s ease forwards;
}

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

button {
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
}

.yes { background:#ff4d6d; color:white; }
.no { background:#aaa; color:white; }

/* TEXT */
.text {
    display: none;
    margin-top: 20px;
    font-size: 22px;
    line-height: 1.6;
}

.mainText { color:#ff2e63; }
.questionText { color:#c94f7c; font-style: italic; }

/* typing */
.word {
    opacity: 0;
    transform: translateY(10px);
    display: inline-block;
    animation: fadeWord 0.5s forwards;
    margin-right: 6px;
}

@keyframes fadeWord {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<audio id="bgMusic" src="HYBS - TipToe (Official Video).mp3" preload="auto" loop></audio>

<script src="https://cdn.lordicon.com/lordicon.js"></script>

<div class="container">

    <!-- 💋 KISS -->
    <div class="kissWrap" id="char">
        <lord-icon
            src="https://cdn.lordicon.com/xyboiuok.json"
            trigger="loop"
            colors="primary:#ff4d6d,secondary:#ff9eb5"
            style="width:120px;height:120px">
        </lord-icon>
    </div>

    <h2 id="question">i have something to say for you, are you ready?</h2>

    <!-- 🌸 FLOWER -->
    <lord-icon
        class="bouquet"
        id="bouquet"
        src="https://cdn.lordicon.com/eaxiadjd.json"
        trigger="loop"
        colors="primary:#ff4d6d,secondary:#ffb6c1,tertiary:#ffd6e0"
        style="width:200px;height:200px">
    </lord-icon>

    <div class="buttons showBtn" id="btn1">
        <button class="yes" id="yes1">Yes</button>
        <button class="no" id="no1">No</button>
    </div>

    <div class="text mainText" id="msg1"></div>
    <div class="text questionText" id="msg2"></div>

    <div class="buttons2" id="btn2">
        <button class="yes" id="yes2">Yes</button>
        <button class="no" id="no2">No</button>
    </div>

    <div class="text mainText" id="msg3"></div>

</div>

<script>
const music = document.getElementById("bgMusic");

function playMusic() {
    music.load();
    music.volume = 0.5;
    music.play().catch(()=>{});
}

function typeWordsSmooth(el,text,delay=250){
    el.style.display="block";
    el.innerHTML="";
    text.split(" ").forEach((w,i)=>{
        let s=document.createElement("span");
        s.className="word";
        s.style.animationDelay=(i*delay)+"ms";
        s.textContent=w;
        el.appendChild(s);
    });
}

/* 🔥 FIX NO BUTTON BIAR GA KELUAR LAYAR */
function antiClick(btn){
    btn.addEventListener("mouseover",()=>{

        const margin = 10;

        const maxX = window.innerWidth - btn.offsetWidth - margin;
        const maxY = window.innerHeight - btn.offsetHeight - margin;

        const x = Math.random() * maxX;
        const y = Math.random() * maxY;

        btn.style.position="fixed";
        btn.style.left = Math.max(margin, x) + "px";
        btn.style.top  = Math.max(margin, y) + "px";
    });
}

antiClick(no1);

yes1.onclick=()=>{
    playMusic();

    question.style.display="none";
    btn1.style.display="none";

    char.style.display="none";
    bouquet.style.opacity="1";

    typeWordsSmooth(msg1,"you’re the prettiest, smartest, cutest girl i’ve seen i love you ❤️");

    setTimeout(()=>{
        typeWordsSmooth(msg2,"i have something else, wanna see?");
    },3500);

    setTimeout(()=>{
        btn2.style.display="flex";
        btn2.classList.add("showBtn");
        antiClick(no2);
    },6000);
};

yes2.onclick=()=>{
    btn2.style.display="none";

    typeWordsSmooth(
        msg3,
        "You're amazing babe, you've done your best and im proud of you. Keep it up pwitiee, i'll always be there for you 💖"
    );
};
</script>

</body>
</html>
