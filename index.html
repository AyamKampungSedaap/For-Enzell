<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
html, body {
    margin: 0;
    height: 100%;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Playfair Display', serif;
    background: linear-gradient(135deg, #ffc0cb, #ffe4ec);
}

.container {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* KARAKTER */
.characters {
    font-size: 70px;
    animation: bounce 1.5s infinite;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
}

/* 🌸 LILY */
.lily {
    width: 120px;
    opacity: 0;
    transform: scale(0.5);
}

/* mekarnya */
.showLily {
    animation: bloom 2.5s ease forwards, sway 4s ease-in-out infinite;
}

@keyframes bloom {
    0% {
        opacity: 0;
        transform: scale(0.5) rotate(-8deg);
    }
    100% {
        opacity: 1;
        transform: scale(1) rotate(0deg);
    }
}

/* 🌬️ goyang pelan */
@keyframes sway {
    0% { transform: rotate(0deg) translateY(0); }
    25% { transform: rotate(2deg) translateY(-2px); }
    50% { transform: rotate(0deg) translateY(0); }
    75% { transform: rotate(-2deg) translateY(-2px); }
    100% { transform: rotate(0deg) translateY(0); }
}

/* BUTTON */
.buttons, .buttons2 {
    margin-top: 20px;
    display: flex;
    gap: 15px;
    opacity: 0;
    transform: translateY(20px);
}

.showBtn {
    animation: fadeUp 1s ease forwards;
}

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

button {
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
}

.yes { background:#ff4d6d; color:white; }
.no { background:#aaa; color:white; }

/* TEXT */
.text {
    display: none;
    margin-top: 20px;
    font-size: 22px;
    line-height: 1.6;
}

.mainText { color:#ff2e63; }
.questionText { color:#c94f7c; font-style: italic; }

/* typing */
.word {
    opacity: 0;
    transform: translateY(10px);
    display: inline-block;
    animation: fadeWord 0.5s forwards;
    margin-right: 6px;
}

@keyframes fadeWord {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* MOBILE */
@media (max-width: 480px) {
    .characters { font-size: 50px; }
    .lily { width: 90px; }
    .text { font-size: 18px; }
}
</style>
</head>

<body>

<audio id="bgMusic" src="HYBS - TipToe (Official Video).mp3" preload="auto" loop></audio>

<div class="container">

    <div class="characters" id="char">🐻💖🐰</div>

    <!-- 🌸 LILY -->
    <svg class="lily" id="lily" viewBox="0 0 100 100">
        <path d="M50 20 C60 40, 80 40, 50 80 C20 40, 40 40, 50 20" fill="#ff9eb5"/>
        <circle cx="50" cy="55" r="5" fill="#ffd166"/>
    </svg>

    <h2 id="question">i have something to say for you, are you ready?</h2>

    <div class="buttons showBtn" id="btn1">
        <button class="yes" id="yes1">Yes</button>
        <button class="no" id="no1">No</button>
    </div>

    <div class="text mainText" id="msg1"></div>
    <div class="text questionText" id="msg2"></div>

    <div class="buttons2" id="btn2">
        <button class="yes" id="yes2">Yes</button>
        <button class="no" id="no2">No</button>
    </div>

    <div class="text mainText" id="msg3"></div>

</div>

<script>
const music = document.getElementById("bgMusic");

function playMusic(){
    music.load();
    music.volume = 0.5;
    music.play().catch(()=>{});
}

function typeWordsSmooth(el,text,delay=250){
    el.style.display="block";
    el.innerHTML="";
    text.split(" ").forEach((w,i)=>{
        let s=document.createElement("span");
        s.className="word";
        s.style.animationDelay=(i*delay)+"ms";
        s.textContent=w;
        el.appendChild(s);
    });
}

function antiClick(btn){
    btn.addEventListener("click",(e)=>{
        e.preventDefault();
        btn.style.position="fixed";
        btn.style.left=Math.random()*80+"%";
        btn.style.top=Math.random()*80+"%";
    });
}

antiClick(no1);

yes1.onclick=()=>{
    playMusic();

    question.style.display="none";
    btn1.style.display="none";

    char.style.display="none";
    lily.classList.add("showLily");

    typeWordsSmooth(msg1,"you’re the prettiest, smartest, cutest girl i’ve seen i love you ❤️");

    setTimeout(()=>{
        typeWordsSmooth(msg2,"i have something else, wanna see?");
    },3500);

    setTimeout(()=>{
        btn2.style.display="flex";
        btn2.classList.add("showBtn");
        antiClick(no2);
    },6000);
};

yes2.onclick=()=>{
    btn2.style.display="none";
    typeWordsSmooth(msg3,"You're amazing babe, you've done your best and i'm proud of you. Keep it up pwitiee, i'll always be there for you 💖");
};
</script>

</body>
</html>
