<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
html, body {
    margin: 0;
    height: 100%;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Great Vibes', cursive;
    background: linear-gradient(135deg, #ffc0cb, #ffe4ec);
}

.container {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.characters {
    font-size: 70px;
    animation: bounce 1.5s infinite;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
}

h2 {
    color: #d63384;
    font-size: 24px;
}

.buttons {
    margin-top: 20px;
    display: flex;
    gap: 15px;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-family: Arial, sans-serif;
}

.yes {
    background-color: #ff4d6d;
    color: white;
}

.no {
    background-color: #aaa;
    color: white;
}

/* TEXT */
.text {
    display: none;
    margin-top: 20px;
    font-size: 26px;
    color: #ff2e63;
    opacity: 0;
}

.show {
    display: block;
    opacity: 1;
}

/* BUTTON 2 */
.buttons2 {
    display: none;
    margin-top: 15px;
    gap: 10px;
}

.showBtn {
    display: flex;
}

/* MOBILE */
@media (max-width: 480px) {
    .characters { font-size: 50px; }
    h2 { font-size: 20px; }
    .text { font-size: 20px; }
}
</style>
</head>

<body>

<audio id="bgMusic" src="tptoe.mp3" loop></audio>

<div class="container">

    <div class="characters">🐻💖🐰</div>

    <h2 id="question">i have something to say for you, are you ready?</h2>

    <div class="buttons" id="btn1">
        <button class="yes" id="yes1">Yes</button>
        <button class="no" id="no1">No</button>
    </div>

    <div class="text" id="msg1"></div>
    <div class="text" id="msg2"></div>

    <div class="buttons2" id="btn2">
        <button class="yes" id="yes2">Yes</button>
        <button class="no" id="no2">No</button>
    </div>

    <div class="text" id="msg3"></div>

</div>

<script>
const music = document.getElementById("bgMusic");

// 🎯 typing per kata
function typeWords(element, text, speed = 200) {
    element.innerHTML = "";
    element.classList.add("show");

    const words = text.split(" ");
    let i = 0;

    function addWord() {
        if (i < words.length) {
            element.innerHTML += words[i] + " ";
            i++;
            setTimeout(addWord, speed);
        }
    }

    addWord();
}

// 😈 tombol NO teleport
function antiClick(btn) {
    function move(e) {
        e.preventDefault();

        const x = Math.random() * (window.innerWidth - btn.offsetWidth);
        const y = Math.random() * (window.innerHeight - btn.offsetHeight);

        btn.style.position = "fixed";
        btn.style.left = x + "px";
        btn.style.top = y + "px";
    }

    btn.addEventListener("mousedown", move);
    btn.addEventListener("touchstart", move);
    btn.addEventListener("click", move);
}

// aktifin NO pertama
antiClick(document.getElementById("no1"));

// FLOW
document.getElementById("yes1").onclick = () => {

    // 🎵 play music
    music.volume = 0.5;
    music.play();

    document.getElementById("question").style.display = "none";
    document.getElementById("btn1").style.display = "none";

    // TEXT 1
    typeWords(
        document.getElementById("msg1"),
        "you’re the prettiest, smartest, cutest girl i’ve seen i love you ❤️",
        180
    );

    // TEXT 2
    setTimeout(() => {
        typeWords(
            document.getElementById("msg2"),
            "i have something else, wanna see?",
            180
        );
    }, 3000);

    // tombol kedua
    setTimeout(() => {
        document.getElementById("btn2").classList.add("showBtn");
        antiClick(document.getElementById("no2"));
    }, 5000);
};

// YES kedua
document.getElementById("yes2").onclick = () => {
    document.getElementById("btn2").style.display = "none";

    typeWords(
        document.getElementById("msg3"),
        "You're amazing babe, you've done your best and im proud of you. Keep it up pwitiee, i'll always be there for you 💖",
        160
    );
};
</script>

</body>
</html>
