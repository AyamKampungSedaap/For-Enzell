<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
html, body {
    margin: 0;
    height: 100%;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Playfair Display', serif;
    background: linear-gradient(135deg, #ffc0cb, #ffe4ec);
}

.container {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* CHARACTER AWAL */
.characters {
    font-size: 70px;
    animation: bounce 1.5s infinite;
}

/* BUNGA */
.flower {
    font-size: 60px;
    opacity: 0;
    transform: scale(0.5);
}

.showFlower {
    animation: bloom 2s ease forwards;
}

@keyframes bloom {
    to {
        opacity: 1;
        transform: scale(1);
    }
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
}

h2 {
    color: #d63384;
    font-size: 22px;
}

/* BUTTON */
.buttons, .buttons2 {
    margin-top: 20px;
    display: flex;
    gap: 15px;
    opacity: 0;
    transform: translateY(20px);
}

.showBtn {
    animation: fadeUp 1s ease forwards;
}

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

button {
    padding: 10px 20px;
    font-size: 15px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
}

.yes {
    background-color: #ff4d6d;
    color: white;
}

.no {
    background-color: #aaa;
    color: white;
}

/* TEXT */
.text {
    display: none;
    margin-top: 20px;
    font-size: 22px;
    line-height: 1.6;
}

/* TEXT UTAMA */
.mainText {
    color: #ff2e63;
}

/* TEXT PERTANYAAN */
.questionText {
    color: #c94f7c; /* 🔥 beda warna */
    font-style: italic;
}

/* typing */
.word {
    opacity: 0;
    transform: translateY(10px);
    display: inline-block;
    animation: fadeWord 0.5s forwards;
    margin-right: 6px;
}

@keyframes fadeWord {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@media (max-width: 480px) {
    .characters { font-size: 50px; }
    .flower { font-size: 50px; }
    h2 { font-size: 18px; }
    .text { font-size: 18px; }
}
</style>
</head>

<body>

<audio id="bgMusic" src="HYBS - TipToe (Official Video).mp3" preload="auto" loop></audio>

<div class="container">

    <div class="characters" id="char">🐻💖🐰</div>
    <div class="flower" id="flower">🌸</div>

    <h2 id="question">i have something to say for you, are you ready?</h2>

    <div class="buttons showBtn" id="btn1">
        <button class="yes" id="yes1">Yes</button>
        <button class="no" id="no1">No</button>
    </div>

    <div class="text mainText" id="msg1"></div>
    <div class="text questionText" id="msg2"></div>

    <div class="buttons2" id="btn2">
        <button class="yes" id="yes2">Yes</button>
        <button class="no" id="no2">No</button>
    </div>

    <div class="text mainText" id="msg3"></div>

</div>

<script>
const music = document.getElementById("bgMusic");

function playMusic() {
    music.load();
    music.volume = 0.5;
    let p = music.play();
    if (p !== undefined) {
        p.catch(() => {
            document.addEventListener("click", () => music.play(), { once: true });
        });
    }
}

// typing smooth
function typeWordsSmooth(element, text, delay = 250) {
    element.style.display = "block";
    element.innerHTML = "";

    const words = text.split(" ");
    words.forEach((word, i) => {
        const span = document.createElement("span");
        span.classList.add("word");
        span.style.animationDelay = (i * delay) + "ms";
        span.textContent = word;
        element.appendChild(span);
    });
}

// tombol NO teleport
function antiClick(btn) {
    function move(e) {
        e.preventDefault();
        const x = Math.random() * (window.innerWidth - btn.offsetWidth);
        const y = Math.random() * (window.innerHeight - btn.offsetHeight);
        btn.style.position = "fixed";
        btn.style.left = x + "px";
        btn.style.top = y + "px";
    }
    btn.addEventListener("mousedown", move);
    btn.addEventListener("touchstart", move);
    btn.addEventListener("click", move);
}

antiClick(document.getElementById("no1"));

document.getElementById("yes1").onclick = () => {

    playMusic();

    document.getElementById("question").style.display = "none";
    document.getElementById("btn1").style.display = "none";

    // ganti ke bunga
    document.getElementById("char").style.display = "none";
    const flower = document.getElementById("flower");
    flower.classList.add("showFlower");

    typeWordsSmooth(
        document.getElementById("msg1"),
        "you’re the prettiest, smartest, cutest girl i’ve seen i love you ❤️"
    );

    setTimeout(() => {
        typeWordsSmooth(
            document.getElementById("msg2"),
            "i have something else, wanna see?"
        );
    }, 3500);

    setTimeout(() => {
        const btn2 = document.getElementById("btn2");
        btn2.style.display = "flex";
        btn2.classList.add("showBtn");
        antiClick(document.getElementById("no2"));
    }, 6000);
};

document.getElementById("yes2").onclick = () => {
    document.getElementById("btn2").style.display = "none";

    typeWordsSmooth(
        document.getElementById("msg3"),
        "You're amazing babe, you've done your best and im proud of you. Keep it up pwitiee, i'll always be there for you 💖"
    );
};
</script>

</body>
</html>
