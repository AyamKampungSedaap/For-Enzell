<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
html, body {
    margin: 0;
    height: 100vh;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Playfair Display', serif;
    background: linear-gradient(135deg, #ffc0cb, #ffe4ec);
}

.container {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.characters {
    font-size: 70px;
    animation: bounce 1.5s infinite;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
}

h2 {
    color: #d63384;
    font-size: 22px;
}

.buttons, .buttons2 {
    margin-top: 20px;
    display: flex;
    gap: 15px;
    opacity: 0;
    transform: translateY(30px) scale(0.9);
}

/* ✨ SMOOTH APPEAR ANIMATION */
.buttons.show, .buttons2.show {
    animation: smoothAppear 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

@keyframes smoothAppear {
    0% {
        opacity: 0;
        transform: translateY(30px) scale(0.8) rotate(-5deg);
    }
    50% {
        opacity: 0.6;
        transform: translateY(8px) scale(1.05) rotate(2deg);
    }
    100% {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(0deg);
    }
}

.yes {
    animation: yesGlow 2s ease-in-out infinite;
    background: linear-gradient(135deg, #ff4d6d, #ff6b9d);
    box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
    transition: all 0.3s ease;
}

.yes:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 8px 25px rgba(255, 77, 109, 0.7);
}

@keyframes yesGlow {
    0%, 100% { 
        box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
        transform: scale(1);
    }
    50% { 
        box-shadow: 0 8px 25px rgba(255, 77, 109, 0.7);
        transform: scale(1.03);
    }
}

.no {
    background: linear-gradient(135deg, #aaa, #ccc);
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    transition: all 0.3s ease;
}

.no:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}

button {
    padding: 12px 24px;
    font-size: 15px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    font-weight: 500;
    min-width: 85px;
}

.text {
    display: none;
    margin-top: 20px;
    font-size: 22px;
    color: #ff2e63;
    line-height: 1.6;
}

.word {
    opacity: 0;
    transform: translateY(10px);
    display: inline-block;
    animation: fadeWord 0.5s forwards;
    margin-right: 6px;
}

@keyframes fadeWord {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@media (max-width: 480px) {
    .characters { font-size: 50px; }
    h2 { font-size: 18px; }
    .text { font-size: 18px; }
    button { padding: 10px 20px; font-size: 14px; min-width: 75px; }
}
</style>
</head>

<body>

<audio id="bgMusic" src="HYBS - TipToe (Official Video).mp3" preload="auto" loop></audio>

<div class="container">

    <div class="characters">🐻💖🐰</div>

    <h2 id="question">i have something to say for you, are you ready?</h2>

    <div class="buttons show" id="btn1">
        <button class="yes" id="yes1">Yes</button>
        <button class="no" id="no1">No</button>
    </div>

    <div class="text" id="msg1"></div>
    <div class="text" id="msg2"></div>

    <div class="buttons2" id="btn2">
        <button class="yes" id="yes2">Yes</button>
        <button class="no" id="no2">No</button>
    </div>

    <div class="text" id="msg3"></div>

</div>

<script>
const music = document.getElementById("bgMusic");

function playMusic() {
    music.load();
    music.volume = 0.5;

    let playPromise = music.play();
    if (playPromise !== undefined) {
        playPromise.catch(() => {
            document.addEventListener("click", () => {
                music.play();
            }, { once: true });
        });
    }
}

function typeWordsSmooth(element, text, delay = 250) {
    element.style.display = "block";
    element.innerHTML = "";

    const words = text.split(" ");
    words.forEach((word, i) => {
        const span = document.createElement("span");
        span.classList.add("word");
        span.style.animationDelay = (i * delay) + "ms";
        span.textContent = word;
        element.appendChild(span);
    });
}

function antiClick(btn) {
    function move(e) {
        e.preventDefault();
        e.stopPropagation();

        const x = Math.random() * (window.innerWidth - btn.offsetWidth - 20);
        const y = Math.random() * (window.innerHeight - btn.offsetHeight - 20);

        btn.style.position = "fixed";
        btn.style.left = x + "px";
        btn.style.top = y + "px";
        btn.style.zIndex = "9999";
    }

    btn.addEventListener("mousedown", move);
    btn.addEventListener("touchstart", move);
    btn.addEventListener("click", move);
}

antiClick(document.getElementById("no1"));

document.getElementById("yes1").onclick = () => {
    playMusic();

    document.getElementById("question").style.display = "none";
    document.getElementById("btn1").style.display = "none";

    typeWordsSmooth(
        document.getElementById("msg1"),
        "you’re the prettiest, smartest, cutest girl i’ve seen i love you ❤️"
    );

    setTimeout(() => {
        typeWordsSmooth(
            document.getElementById("msg2"),
            "i have something else, wanna see?"
        );
    }, 3500);

    setTimeout(() => {
        document.getElementById("btn2").classList.add("show");
        antiClick(document.getElementById("no2"));
    }, 6000);
};

document.getElementById("yes2").onclick = () => {
    document.getElementById("btn2").style.display = "none";

    typeWordsSmooth(
        document.getElementById("msg3"),
        "You're amazing babe, you've done your best and im proud of you. Keep it up pwitiee, i'll always be there for you 💖"
    );
};
</script>

</body>
</html>
