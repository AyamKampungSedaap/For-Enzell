<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<!-- FONT PLAYFAIR -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
html, body {
    margin: 0;
    height: 100%;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Playfair Display', serif;
    background: linear-gradient(135deg, #ffc0cb, #ffe4ec);
}

.container {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* CHARACTER */
.characters {
    font-size: 70px;
    animation: bounce 1.5s infinite;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
}

h2 {
    color: #d63384;
    font-size: 22px;
}

/* BUTTON */
.buttons {
    margin-top: 20px;
    display: flex;
    gap: 15px;
}

button {
    padding: 10px 20px;
    font-size: 15px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
}

.yes {
    background-color: #ff4d6d;
    color: white;
}

.no {
    background-color: #aaa;
    color: white;
}

/* TEXT */
.text {
    display: none;
    margin-top: 20px;
    font-size: 22px;
    color: #ff2e63;
}

/* typing smooth */
.word {
    opacity: 0;
    transform: translateY(10px);
    display: inline-block;
    animation: fadeWord 0.4s forwards;
}

@keyframes fadeWord {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* BUTTON 2 */
.buttons2 {
    display: none;
    margin-top: 15px;
    gap: 10px;
}

/* MOBILE */
@media (max-width: 480px) {
    .characters { font-size: 50px; }
    h2 { font-size: 18px; }
    .text { font-size: 18px; }
}
</style>
</head>

<body>

<audio id="bgMusic" src="tptoe.mp3" preload="auto" loop></audio>

<div class="container">

    <div class="characters">🐻💖🐰</div>

    <h2 id="question">i have something to say for you, are you ready?</h2>

    <div class="buttons" id="btn1">
        <button class="yes" id="yes1">Yes</button>
        <button class="no" id="no1">No</button>
    </div>

    <div class="text" id="msg1"></div>
    <div class="text" id="msg2"></div>

    <div class="buttons2" id="btn2">
        <button class="yes" id="yes2">Yes</button>
        <button class="no" id="no2">No</button>
    </div>

    <div class="text" id="msg3"></div>

</div>

<script>
const music = document.getElementById("bgMusic");

// 🎵 FIX AUDIO (SUPER AMAN)
function playMusic() {
    music.load();
    music.volume = 0.5;

    const playPromise = music.play();

    if (playPromise !== undefined) {
        playPromise.catch(() => {
            document.addEventListener("click", () => {
                music.play();
            }, { once: true });
        });
    }
}

// ✨ typing smooth per kata (ga kaku)
function typeWordsSmooth(element, text, delay = 200) {
    element.style.display = "block";
    element.innerHTML = "";

    const words = text.split(" ");
    words.forEach((word, i) => {
        const span = document.createElement("span");
        span.classList.add("word");
        span.style.animationDelay = (i * delay) + "ms";
        span.innerHTML = word + " ";
        element.appendChild(span);
    });
}

// 😈 tombol NO teleport
function antiClick(btn) {
    function move(e) {
        e.preventDefault();

        const x = Math.random() * (window.innerWidth - btn.offsetWidth);
        const y = Math.random() * (window.innerHeight - btn.offsetHeight);

        btn.style.position = "fixed";
        btn.style.left = x + "px";
        btn.style.top = y + "px";
    }

    btn.addEventListener("mousedown", move);
    btn.addEventListener("touchstart", move);
    btn.addEventListener("click", move);
}

antiClick(document.getElementById("no1"));

// FLOW
document.getElementById("yes1").onclick = () => {

    playMusic(); // 🔥 FIX AUDIO

    document.getElementById("question").style.display = "none";
    document.getElementById("btn1").style.display = "none";

    typeWordsSmooth(
        document.getElementById("msg1"),
        "you’re the prettiest, smartest, cutest girl i’ve seen i love you ❤️",
        150
    );

    setTimeout(() => {
        typeWordsSmooth(
            document.getElementById("msg2"),
            "i have something else, wanna see?",
            150
        );
    }, 2500);

    setTimeout(() => {
        document.getElementById("btn2").style.display = "flex";
        antiClick(document.getElementById("no2"));
    }, 4500);
};

// YES kedua
document.getElementById("yes2").onclick = () => {
    document.getElementById("btn2").style.display = "none";

    typeWordsSmooth(
        document.getElementById("msg3"),
        "You're amazing babe, you've done your best and im proud of you. Keep it up pwitiee, i'll always be there for you 💖",
        140
    );
};
</script>

</body>
</html>
