<script>
const music = document.getElementById("bgMusic");

// autoplay fallback
document.addEventListener("click", () => {
    if (music.paused) music.play();
}, { once: true });

// FUNCTION KABUR (FIXED & LEBIH AGRESIF)
function kabur(btn) {
    function move() {
        const btnWidth = btn.offsetWidth;
        const btnHeight = btn.offsetHeight;

        const maxX = window.innerWidth - btnWidth;
        const maxY = window.innerHeight - btnHeight;

        const x = Math.random() * maxX;
        const y = Math.random() * maxY;

        btn.style.position = "fixed";
        btn.style.left = x + "px";
        btn.style.top = y + "px";
    }

    // semua trigger biar makin mustahil diklik 😈
    btn.addEventListener("mouseover", move);
    btn.addEventListener("mousedown", move);
    btn.addEventListener("touchstart", move);
}

// aktifin tombol pertama
kabur(document.getElementById("no1"));

// flow utama
document.getElementById("yes1").onclick = () => {
    document.getElementById("question").style.display = "none";
    document.getElementById("btn1").style.display = "none";

    const msg1 = document.getElementById("msg1");
    msg1.classList.add("show1");

    // muncul text kedua
    setTimeout(() => {
        const msg2 = document.getElementById("msg2");
        msg2.classList.add("show2");
    }, 2500);

    // muncul tombol kedua + AKTIFIN KABUR DISINI 🔥
    setTimeout(() => {
        const btn2 = document.getElementById("btn2");
        btn2.classList.add("show3");

        const no2 = document.getElementById("no2");
        kabur(no2); // <<< FIX UTAMA ADA DI SINI
    }, 4000);
};

// tombol yes kedua
document.getElementById("yes2").onclick = () => {
    alert("nah ini tinggal kamu isi endingnya 😏💖");
};
</script>
