<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffc0cb, #ffe4ec);
    overflow: hidden;
}

.container {
    text-align: center;
    padding: 20px;
}

.characters {
    font-size: 70px;
    animation: bounce 1.5s infinite;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
}

h2 {
    margin-top: 20px;
    color: #d63384;
    font-size: 18px;
}

/* BUTTONS CENTER FIX */
.buttons {
    margin-top: 25px;
    display: flex;
    justify-content: center;
    gap: 15px;
    position: relative;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
}

#yesBtn {
    background-color: #ff4d6d;
    color: white;
}

#noBtn {
    background-color: #aaa;
    color: white;
    position: relative;
}

/* MESSAGE ANIMATION */
.message {
    display: none;
    font-size: 20px;
    color: #ff2e63;
    margin-top: 30px;
    opacity: 0;
    transform: translateX(100px);
}

/* FADE IN FROM RIGHT */
.show {
    display: block;
    animation: slideFade 1.5s ease forwards;
}

@keyframes slideFade {
    from {
        opacity: 0;
        transform: translateX(100px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

/* MOBILE RESPONSIVE */
@media (max-width: 480px) {
    .characters {
        font-size: 50px;
    }

    h2 {
        font-size: 16px;
    }

    button {
        font-size: 14px;
        padding: 8px 16px;
    }
}
</style>
</head>

<body>

<!-- 🎵 AUDIO -->
<audio id="bgMusic" src="tptoe.mp3" loop></audio>

<div class="container">
    <div class="characters">🐻💖🐰</div>

    <h2 id="question">i have something to say for you, are you ready?</h2>

    <div class="buttons">
        <button id="yesBtn">Yes</button>
        <button id="noBtn">No</button>
    </div>

    <div class="message" id="message">
        you’re the prettiest, smartest, cuttest girl i’ve seen i love you ❤️
    </div>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const message = document.getElementById("message");
const question = document.getElementById("question");
const music = document.getElementById("bgMusic");

// 🎵 autoplay attempt
window.addEventListener("load", () => {
    music.volume = 0.5;
    music.play().catch(() => {});
});

// 🎵 fallback (mobile pasti kena sini)
document.addEventListener("click", () => {
    if (music.paused) {
        music.play();
    }
}, { once: true });

// tombol NO kabur (lebih smooth & tetap di layar)
noBtn.addEventListener("mouseover", moveNo);
noBtn.addEventListener("click", moveNo);

function moveNo() {
    const btnWidth = noBtn.offsetWidth;
    const btnHeight = noBtn.offsetHeight;

    const maxX = window.innerWidth - btnWidth;
    const maxY = window.innerHeight - btnHeight;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.position = "fixed";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

// tombol YES
yesBtn.addEventListener("click", () => {
    question.style.display = "none";
    noBtn.style.display = "none";
    yesBtn.style.display = "none";

    message.classList.add("show");
});
</script>

</body>
</html>
