<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
html, body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    user-select: none;
}

body {
    font-family: 'Playfair Display', serif;
    background: linear-gradient(135deg, #ffc0cb, #ffe4ec);
    position: relative;
}

/* 🔥 STATE CONTAINER - SAM format */
.stateContainer {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 20px;
    width: 100%;
    max-width: 400px;
    padding: 20px;
    box-sizing: border-box;
    z-index: 10;
}

/* 💋 KISS */
.kissWrap {
    opacity: 0;
    transform: translateY(-20px) scale(0.8);
    animation: kissIn 1.2s ease forwards;
}

@keyframes kissIn {
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

.kissWrap lord-icon {
    animation: float 2.5s ease-in-out infinite;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

.stateContainer h2 {
    margin: 0;
    font-size: clamp(20px, 4vw, 28px);
    line-height: 1.3;
    max-width: 90%;
}

/* BUTTON */
.buttons {
    display: flex;
    gap: 12px;
    opacity: 0;
    transform: translateY(20px);
}

.showBtn {
    animation: fadeUp 1s ease forwards;
}

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

button {
    padding: 12px 24px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 16px;
    font-weight: 500;
    min-width: 80px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    transition: all 0.3s ease;
    position: relative;
    z-index: 20;
}

.yes { 
    background: linear-gradient(135deg, #ff4d6d, #ff6b9d);
    color: white;
    pointer-events: auto;
}
.yes:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 77, 109, 0.6); }

/* 🔥 NO BUTTON - PATTERN MOVEMENT */
.no {
    background: linear-gradient(135deg, #aaa, #ccc);
    color: white;
    pointer-events: auto;
}

.no.moving {
    position: fixed !important;
    z-index: 9999 !important;
    animation: slideMove 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    box-shadow: 0 8px 25px rgba(0,0,0,0.3) !important;
}

@keyframes slideMove {
    0% {
        transform: translateX(0) translateY(0) scale(1);
        opacity: 1;
    }
    50% {
        transform: translateX(var(--move-x, 0px)) translateY(var(--move-y, 0px)) scale(1.1);
        opacity: 0.9;
    }
    100% {
        transform: translateX(var(--move-x, 0px)) translateY(var(--move-y, 0px)) scale(1);
        opacity: 1;
    }
}

/* 🌸 FLOWER */
.bouquet {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    width: 200px;
    opacity: 0;
    transition: all 1s ease;
    z-index: 5;
}

/* RESPONSIVE */
@media (max-width: 480px) {
    .stateContainer {
        gap: 15px;
        padding: 15px;
    }
    button {
        padding: 10px 20px;
        font-size: 15px;
        min-width: 70px;
    }
}
</style>
</head>

<body>

<audio id="bgMusic" src="HYBS - TipToe (Official Video).mp3" preload="auto" loop></audio>

<script src="https://cdn.lordicon.com/lordicon.js"></script>

<!-- STATE 1 -->
<div class="stateContainer" id="state1">
    <div class="kissWrap" id="char1">
        <lord-icon
            src="https://cdn.lordicon.com/xyboiuok.json"
            trigger="loop"
            colors="primary:#ff4d6d,secondary:#ff9eb5"
            style="width:120px;height:120px">
        </lord-icon>
    </div>

    <h2 id="question1">i have something to say for you, are you ready?</h2>

    <div class="buttons showBtn" id="btn1">
        <button class="yes" id="yes1">Yes</button>
        <button class="no" id="no1">No</button>
    </div>
</div>

<!-- STATE 2 ELEMENTS -->
<lord-icon class="bouquet" id="bouquet1" src="https://cdn.lordicon.com/eaxiadjd.json" trigger="loop" colors="primary:#ff4d6d,secondary:#ffb6c1,tertiary:#ffd6e0" style="width:200px;height:200px"></lord-icon>

<!-- STATE 3 -->
<div class="stateContainer" id="state3" style="display:none;">
    <div class="kissWrap" id="char3">
        <lord-icon
            src="https://cdn.lordicon.com/xyboiuok.json"
            trigger="loop"
            colors="primary:#ff4d6d,secondary:#ff9eb5"
            style="width:120px;height:120px">
        </lord-icon>
    </div>

    <h2 id="question3">[TULIS TEXT STATE 3 DI SINI]</h2>

    <div class="buttons showBtn" id="btn3">
        <button class="yes" id="yes3">Yes</button>
        <button class="no" id="no3">No</button>
    </div>
</div>

<script>
const music = document.getElementById("bgMusic");
let moveCounter = 0;

function playMusic() {
    music.load();
    music.volume = 0.5;
    music.play().catch(()=>{});
}

function patternMoveNoButton(btn) {
    const rect = btn.getBoundingClientRect();
    const margin = 30;
    const screenW = window.innerWidth;
    const screenH = window.innerHeight;
    const btnW = rect.width || 100;
    const btnH = rect.height || 50;
    
    // ✅ PATTERN YANG KEREN - TIDAK NGE-RANDOM KE YES
    const patterns = [
        // 4 Sudut layar
        {x: margin, y: margin},                    // Top-left
        {x: screenW - btnW - margin, y: margin},   // Top-right  
        {x: screenW - btnW - margin, y: screenH - btnH - margin}, // Bottom-right
        {x: margin, y: screenH - btnH - margin},   // Bottom-left
        
        // Tengah sisi
        {x: screenW/2 - btnW/2, y: margin},                    // Top center
        {x: screenW - btnW - margin, y: screenH/2 - btnH/2},   // Right center
        {x: screenW/2 - btnW/2, y: screenH - btnH - margin},   // Bottom center
        {x: margin, y: screenH/2 - btnH/2},                    // Left center
        
        // Diagonal
        {x: screenW * 0.2, y: screenH * 0.2},
        {x: screenW * 0.8, y: screenH * 0.8},
        {x: screenW * 0.8, y: screenH * 0.2},
        {x: screenW * 0.2, y: screenH * 0.8}
    ];
    
    // Pilih pattern berdasarkan counter (kelihatan acak)
    const patternIndex = moveCounter % patterns.length;
    const targetPos = patterns[patternIndex];
    
    moveCounter++;
    
    // Set CSS variables untuk animasi
    btn.style.setProperty('--move-x', `${targetPos.x - rect.left}px`);
    btn.style.setProperty('--move-y', `${targetPos.y - rect.top}px`);
    
    // Trigger animasi
    btn.classList.remove('moving');
    void btn.offsetWidth; // Trigger reflow
    btn.classList.add('moving');
    
    // Pindah posisi setelah animasi
    setTimeout(() => {
        btn.style.position = 'fixed';
        btn.style.left = targetPos.x + 'px';
        btn.style.top = targetPos.y + 'px';
        btn.style.zIndex = '9999';
    }, 300);
    
    // Loop pattern
    setTimeout(() => {
        patternMoveNoButton(btn);
    }, 800);
}

// INIT ALL NO BUTTONS
const noButtons = ['no1', 'no2', 'no3'];
noButtons.forEach(id => {
    const btn = document.getElementById(id);
    if (btn) {
        btn.addEventListener('mouseenter', () => patternMoveNoButton(btn));
        btn.addEventListener('touchstart', () => patternMoveNoButton(btn));
    }
});

// STATE 1
document.getElementById("yes1").onclick = ()=>{
    playMusic();
    
    document.getElementById("state1").style.display = "none";
    
    document.getElementById("bouquet1").style.opacity = "1";
    document.getElementById("bouquet1").style.transform = "translate(-50%, -50%) scale(1)";
    
    // Text state 2
    const msg1 = document.createElement("div");
    msg1.id = "msg1";
    msg1.className = "stateContainer";
    msg1.style.zIndex = "15";
    msg1.innerHTML = '<h2 id="text1" style="font-size: clamp(20px, 4vw, 28px); line-height: 1.3; max-width: 90%; margin: 0;"></h2>';
    document.body.appendChild(msg1);
    
    typeWordsSmooth(document.getElementById("text1"), "you’re the prettiest, smartest, cutest girl i’ve seen i love you ❤️");
    
    setTimeout(()=>{
        const msg2 = document.createElement("div");
        msg2.id = "msg2";
        msg2.className = "stateContainer";
        msg2.style.zIndex = "15";
        msg2.innerHTML = '<h2 id="question2" style="font-size: clamp(20px, 4vw, 28px); line-height: 1.3; max-width: 90%; margin: 0; font-style: italic; color: #c94f7c;"></h2>';
        document.body.appendChild(msg2);
        
        typeWordsSmooth(document.getElementById("question2"), "i have something else, wanna see?");
    }, 3500);

    setTimeout(()=>{
        const btn2 = document.createElement("div");
        btn2.id = "btn2";
        btn2.className = "buttons showBtn";
        btn2.innerHTML = '<button class="yes" id="yes2">Yes</button><button class="no" id="no2">No</button>';
        btn2.style.position = "fixed";
        btn2.style.top = "55%";
        btn2.style.left = "50%";
        btn2.style.transform = "translate(-50%, 0)";
        btn2.style.zIndex = "20";
        document.body.appendChild(btn2);
        btn2.style.display = "flex";
    }, 6000);
};

// STATE 2 to STATE 3
document.addEventListener('click', function(e) {
    if (e.target.id === 'yes2') {
        document.getElementById("msg1")?.remove();
        document.getElementById("msg2")?.remove();
        document.getElementById("btn2")?.remove();
        document.getElementById("bouquet1").style.opacity = "0";
        document.getElementById("state3").style.display = "flex";
    }
});

// STATE 3
document.getElementById("yes3").onclick = ()=>{
    document.getElementById("question3").textContent = "You're amazing babe, you've done your best and im proud of you. Keep it up pwitiee, i'll always be there for you 💖";
};
</script>

</body>
</html>
