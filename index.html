<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
html, body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    user-select: none;
}

body {
    font-family: 'Playfair Display', serif;
    background: linear-gradient(135deg, #ffc0cb, #ffe4ec);
    position: relative;
}

/* 🔥 STATE CONTAINER - SAM format */
.stateContainer {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 20px;
    width: 100%;
    max-width: 400px;
    padding: 20px;
    box-sizing: border-box;
    z-index: 10;
}

/* 💋 KISS */
.kissWrap {
    opacity: 0;
    transform: translateY(-20px) scale(0.8);
    animation: kissIn 1.2s ease forwards;
}

@keyframes kissIn {
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

.kissWrap lord-icon {
    animation: float 2.5s ease-in-out infinite;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

.stateContainer h2 {
    margin: 0;
    font-size: clamp(20px, 4vw, 28px);
    line-height: 1.3;
    max-width: 90%;
}

/* BUTTON */
.buttons {
    display: flex;
    gap: 12px;
    opacity: 0;
    transform: translateY(20px);
}

.showBtn {
    animation: fadeUp 1s ease forwards;
}

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

button {
    padding: 12px 24px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 16px;
    font-weight: 500;
    min-width: 80px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    transition: all 0.3s ease;
    position: relative;
    z-index: 20;
}

.yes { 
    background: linear-gradient(135deg, #ff4d6d, #ff6b9d);
    color: white;
    pointer-events: auto;
}
.yes:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 77, 109, 0.6); }

.no {
    background: linear-gradient(135deg, #aaa, #ccc);
    color: white;
    pointer-events: auto;
}

/* 🔥 NO BUTTON - 4 SUDUT MOVEMENT */
.no.moving {
    position: fixed !important;
    z-index: 9999 !important;
    animation: cornerMove 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4) !important;
}

@keyframes cornerMove {
    0% {
        transform: scale(1);
    }
    50% {
        transform: scale(1.05);
    }
    100% {
        transform: scale(1);
    }
}

/* 🌸 FLOWER */
.bouquet {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    width: 200px;
    opacity: 0;
    transition: all 1s ease;
    z-index: 5;
}

/* RESPONSIVE */
@media (max-width: 480px) {
    .stateContainer {
        gap: 15px;
        padding: 15px;
    }
    button {
        padding: 10px 20px;
        font-size: 15px;
        min-width: 70px;
    }
}
</style>
</head>

<body>

<audio id="bgMusic" src="HYBS - TipToe (Official Video).mp3" preload="auto" loop></audio>

<script src="https://cdn.lordicon.com/lordicon.js"></script>

<!-- STATE 1 -->
<div class="stateContainer" id="state1">
    <div class="kissWrap" id="char1">
        <lord-icon
            src="https://cdn.lordicon.com/xyboiuok.json"
            trigger="loop"
            colors="primary:#ff4d6d,secondary:#ff9eb5"
            style="width:120px;height:120px">
        </lord-icon>
    </div>

    <h2 id="question1">i have something to say for you, are you ready?</h2>

    <div class="buttons showBtn" id="btn1">
        <button class="yes" id="yes1">Yes</button>
        <button class="no" id="no1">No</button>
    </div>
</div>

<!-- STATE 2 ELEMENTS -->
<lord-icon class="bouquet" id="bouquet1" src="https://cdn.lordicon.com/eaxiadjd.json" trigger="loop" colors="primary:#ff4d6d,secondary:#ffb6c1,tertiary:#ffd6e0" style="width:200px;height:200px"></lord-icon>

<!-- STATE 3 -->
<div class="stateContainer" id="state3" style="display:none;">
    <div class="kissWrap" id="char3">
        <lord-icon
            src="https://cdn.lordicon.com/xyboiuok.json"
            trigger="loop"
            colors="primary:#ff4d6d,secondary:#ff9eb5"
            style="width:120px;height:120px">
        </lord-icon>
    </div>

    <h2 id="question3">[TULIS TEXT STATE 3 DI SINI]</h2>

    <div class="buttons showBtn" id="btn3">
        <button class="yes" id="yes3">Yes</button>
        <button class="no" id="no3">No</button>
    </div>
</div>

<script>
const music = document.getElementById("bgMusic");

// ✅ 4 SUDUT POSISI
const corners = [
    {left: '20px', top: '20px'},           // ATAS KIRI
    {left: 'calc(100% - 120px)', top: '20px'},  // ATAS KANAN
    {left: 'calc(100% - 120px)', top: 'calc(100% - 80px)'}, // BAWAH KANAN
    {left: '20px', top: 'calc(100% - 80px)'}  // BAWAH KIRI
];

function moveToCorner(btn, cornerIndex) {
    const corner = corners[cornerIndex];
    
    // Animasi smooth
    btn.style.position = 'fixed';
    btn.style.left = corner.left;
    btn.style.top = corner.top;
    btn.style.zIndex = '9999';
    
    // Trigger moving class
    btn.classList.remove('moving');
    void btn.offsetWidth;
    btn.classList.add('moving');
}

function startCornerLoop(btn) {
    let currentCorner = 0;
    
    const moveInterval = setInterval(() => {
        moveToCorner(btn, currentCorner);
        currentCorner = (currentCorner + 1) % 4; // Loop 0-1-2-3-0-1...
    }, 1000); // Gerak setiap 1 detik
    
    // Stop jika button di-remove
    const stopLoop = () => clearInterval(moveInterval);
    btn.addEventListener('remove', stopLoop);
    document.addEventListener('yesClicked', stopLoop);
    
    return moveInterval;
}

// INIT ALL NO BUTTONS
document.addEventListener('DOMContentLoaded', () => {
    const noButtons = ['no1', 'no2', 'no3'];
    noButtons.forEach(id => {
        const btn = document.getElementById(id);
        if (btn) {
            // Mulai loop saat pertama kali hover/touch
            let loopStarted = false;
            const startLoop = () => {
                if (!loopStarted) {
                    loopStarted = true;
                    startCornerLoop(btn);
                }
            };
            
            btn.addEventListener('mouseenter', startLoop);
            btn.addEventListener('touchstart', startLoop);
        }
    });
});

// STATE 1
document.getElementById("yes1").onclick = ()=>{
    playMusic();
    
    document.getElementById("state1").style.display = "none";
    
    document.getElementById("bouquet1").style.opacity = "1";
    document.getElementById("bouquet1").style.transform = "translate(-50%, -50%) scale(1)";
    
    // Text state 2
    const msg1 = document.createElement("div");
    msg1.id = "msg1";
    msg1.className = "stateContainer";
    msg1.style.zIndex = "15";
    msg1.innerHTML = '<h2 id="text1" style="font-size: clamp(20px, 4vw, 28px); line-height: 1.3; max-width: 90%; margin: 0;"></h2>';
    document.body.appendChild(msg1);
    
    typeWordsSmooth(document.getElementById("text1"), "you’re the prettiest, smartest, cutest girl i’ve seen i love you ❤️");
    
    setTimeout(()=>{
        const msg2 = document.createElement("div");
        msg2.id = "msg2";
        msg2.className = "stateContainer";
        msg2.style.zIndex = "15";
        msg2.innerHTML = '<h2 id="question2" style="font-size: clamp(20px, 4vw, 28px); line-height: 1.3; max-width: 90%; margin: 0; font-style: italic; color: #c94f7c;"></h2>';
        document.body.appendChild(msg2);
        
        typeWordsSmooth(document.getElementById("question2"), "i have something else, wanna see?");
    }, 3500);

    setTimeout(()=>{
        const btn2 = document.createElement("div");
        btn2.id = "btn2";
        btn2.className = "buttons showBtn";
        btn2.innerHTML = '<button class="yes" id="yes2">Yes</button><button class="no" id="no2">No</button>';
        btn2.style.position = "fixed";
        btn2.style.top = "55%";
        btn2.style.left = "50%";
        btn2.style.transform = "translate(-50%, 0)";
        btn2.style.zIndex = "20";
        document.body.appendChild(btn2);
        btn2.style.display = "flex";
    }, 6000);
};

// STATE 2 to STATE 3
document.addEventListener('click', function(e) {
    if (e.target.id === 'yes2') {
        document.dispatchEvent(new Event('yesClicked'));
        document.getElementById("msg1")?.remove();
        document.getElementById("msg2")?.remove();
        document.getElementById("btn2")?.remove();
        document.getElementById("bouquet1").style.opacity = "0";
        document.getElementById("state3").style.display = "flex";
    }
});

// STATE 3
document.getElementById("yes3").onclick = ()=>{
    document.getElementById("question3").textContent = "You're amazing babe, you've done your best and im proud of you. Keep it up pwitiee, i'll always be there for you 💖";
};

function typeWordsSmooth(el, text, delay=250){
    el.style.display = "block";
    el.innerHTML = "";
    text.split(" ").forEach((w, i)=>{
        let s = document.createElement("span");
        s.className = "word";
        s.style.animationDelay = (i * delay) + "ms";
        s.textContent = w;
        el.appendChild(s);
    });
}
</script>

</body>
</html>
